name: Flink Agents CI

on:
  push:
    branches: [ main, 'release-*' ]
  pull_request:
    branches: [ main, 'release-*' ]
  workflow_dispatch:

jobs:
  cross_language_tests:
    name: cross-language [${{ matrix.os }}] [python-${{ matrix.python-version}}] [java-${{ matrix.java-version}}]
    runs-on: ${{ matrix.os }}
    services:
      elasticsearch:
        image: docker.elastic.co/elasticsearch/elasticsearch:8.19.0
        env:
          discovery.type: single-node
          xpack.security.enabled: false
          ES_JAVA_OPTS: "-Xms512m -Xmx512m"
        ports:
          - 9200:9200
        options: >-
          --health-cmd "curl -f http://localhost:9200/_cluster/health || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
          --health-start-period 30s
    strategy:
      fail-fast: false
      matrix:
        os: [ 'ubuntu-latest' ]
        python-version: [ '3.11' ]
        java-version: [ '17' ]
    steps:
      - uses: actions/checkout@v4
      - name: Install java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java-version }}
          distribution: 'adopt'
      - name: Install python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - name: Build flink-agents
        run: bash tools/build.sh
      - name: Install ollama
        run: bash tools/start_ollama_server.sh
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
      - name: Verify Elasticsearch
        run: |
          echo "Verifying Elasticsearch is ready..."
          max_attempts=30
          attempt=0
          while [ $attempt -lt $max_attempts ]; do
            if curl -s http://localhost:9200/_cluster/health | grep -q "yellow\|green"; then
              echo "✓ Elasticsearch is ready!"
              curl -s http://localhost:9200 | jq .
              break
            fi
            attempt=$((attempt + 1))
            echo "Waiting for Elasticsearch... ($attempt/$max_attempts)"
            sleep 2
          done
          
          if [ $attempt -eq $max_attempts ]; then
            echo "✗ Elasticsearch failed to start"
            exit 1
          fi
      - name: Run e2e tests
        run: bash tools/e2e.sh